externalDocs:
  description: Find out more about Swagger
  url: https://www.google.com/
servers:
  - url: https://dummy.restapiexample.com/api/v1
tags:
  - name: Employee
    description: Everything about your employee

paths:
  /create:
    post:
      tags:
        - Employee
      summary: Create an employee in the database.
      description: Create an employee in the database.
      operationId: employee
      requestBody:
        description: enter deatatils in the request body
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Employee'
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '400':
          description: Invalid ID supplied
        '404':
          description: PEmployee ID is not found
        '422':
          description: Validation exception




components:
  schemas:
    Employee:
      type: object
      properties:
        name:
          format: string
          example: Mahesh
        salary:
          type: integer
          format: int64
          example: 20000
        age:
          type: integer
          format: int32
          example: 23

openapi: 3.0.4
info:
  title: Employee API Documents
  description: >-
    This is an Employee API document for developer audience.
  termsOfService: https://swagger.io/terms/
  contact:
    email: info@techwriterslab.com
  license:
    name: Apache 2.0

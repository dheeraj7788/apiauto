name: API Documentation Pipeline

permissions:
  contents: write

on:
  pull_request:
    branches:
      - main
    paths:
      - "openapi/**"

  push:
    branches:
      - main
    paths:
      - "openapi/**"

jobs:
  api-documentation:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        

      # Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install Redocly CLI
      - name: Install Redocly CLI
        run: npm install -g @redocly/cli

      # Validate OpenAPI specification
      - name: Validate OpenAPI Specification
        run: redocly lint openapi/openapi.yaml

      # Generate HTML documentation
      - name: Generate HTML Documentation
        run: |
          mkdir -p docs
          redocly build-docs openapi/openapi.yaml --output docs/index.html

      # Verify HTML file was generated
      - name: Verify HTML Documentation
        run: |
          test -f docs/index.html
          echo "HTML documentation generated successfully."

      # Validate generated HTML content
      - name: Validate HTML Content
        run: |
          grep "Sample User API" docs/index.html

      # Commit generated documentation
      - name: Commit and Push generated documentation
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/

          git diff --cached --quiet && echo "No documentation changes" && exit 0

          git commit -m "Update API documentation"

          git push
